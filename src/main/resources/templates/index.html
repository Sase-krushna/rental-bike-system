<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RideShare — Bike Rentals</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header class="navbar">
        <div class="navbar-content">
            <h1 class="logo">🚲 RideShare</h1>
            <nav>
                <a href="/">Home</a>
                <a href="#bikes">Browse Bikes</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <h2>Find Your Ride</h2>
        <p>Affordable, convenient bike rentals — book in seconds.</p>
    </section>

    <section class="bike-grid" id="bikes">
        <div class="bike-card" th:each="bike : ${bikes}">
            <img th:src="${bike.imageUrl}" alt="Bike image" class="bike-image">
            <div class="bike-info">
                <h3 th:text="${bike.name}">Bike Name</h3>
                <p class="bike-model" th:text="${bike.model}">Model</p>
                <p class="bike-rate">
                    <span th:text="${'₹' + bike.hourlyRate}">₹0.00</span> / hour
                </p>
                <p class="bike-status"
                   th:classappend="${bike.available} ? 'status-available' : 'status-unavailable'"
                   th:text="${bike.available} ? 'Available' : 'Not Available'">
                   Status
                </p>
                <a th:if="${bike.available}" th:href="@{/rent/{id}(id=${bike.id})}" class="rent-btn">Rent Now</a>
				<button th:if="${!bike.available}" class="rent-btn" disabled>Not Available</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 RideShare. All rights reserved.</p>
    </footer>

</body>
</html>
