<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed — RideShare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header class="navbar">
        <div class="navbar-content">
            <h1 class="logo">🚲 RideShare</h1>
            <nav>
                <a href="/">Home</a>
            </nav>
        </div>
    </header>

    <section class="form-section">
        <div class="form-card confirmation-card">
            <div class="checkmark">✓</div>
            <h2>Booking Confirmed!</h2>
            <p class="confirmation-sub">Your bike is reserved and ready to go.</p>

            <div class="confirmation-details">
                <div class="detail-row">
                    <span>Bike</span>
                    <strong th:text="${rental.bike.name}">Bike Name</strong>
                </div>
                <div class="detail-row">
                    <span>Renter</span>
                    <strong th:text="${rental.renterName}">Name</strong>
                </div>
                <div class="detail-row">
                    <span>Phone</span>
                    <strong th:text="${rental.renterPhone}">Phone</strong>
                </div>
                <div class="detail-row">
                    <span>Start Time</span>
                    <strong th:text="${#temporals.format(rental.startTime, 'dd MMM yyyy, hh:mm a')}">Time</strong>
                </div>
                <div class="detail-row">
                    <span>Rate</span>
                    <strong th:text="${'₹' + rental.bike.hourlyRate + ' / hour'}">Rate</strong>
                </div>
            </div>

            <a href="/" class="rent-btn back-home-btn">Back to Home</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 RideShare. All rights reserved.</p>
    </footer>

</body>
</html>
